output_dir: skills/einar-ioc/rules

outputs:
  - md: einar-template.md
    description: "Einar CLI config - defines how generators create and rename .go files"
    preamble: |
      **How it works:** For each controller, repository, consumer, publisher, etc., Einar CLI generates a **new file** in the structure indicated by `destination_dir`, with a name derived from the template's `source_file` and the operation/entity name. The content is built from the template with `replace_holders` applied (PascalCase/SnakeCase). `ioc_discovery: true` means the CLI adds the package to blank imports in `cmd/api/main.go`.
    sources:
      - .einar.template.json

  - md: structure.md
    description: "Project directory structure"
    structure: true

  - md: archetype-version.md
    description: "Root package - embedded Version from .version file"
    sources:
      - version.go

  - md: main.md
    description: "Application entry point - loads IoC dependencies"
    preamble: |
      **Blank imports:** Each package that registers with `ioc.Register` MUST be imported in `cmd/api/main.go` via `_ "archetype/path/to/package"` (not in `version.go`, which is package archetype and only embeds Version). When adding a new component, the agent must add its blank import so the package loads and the IoC receives the constructor. Example:

      ```go
      import (
          "log"
          "os"
          "strings"
          "archetype"
          _ "archetype/app/adapter/in/fuegoapi"
          _ "archetype/app/adapter/in/eventbus"
          _ "archetype/app/adapter/out/postgres"
          _ "archetype/app/application/usecase"
          _ "archetype/app/shared/infrastructure/httpserver"
          _ "archetype/app/shared/infrastructure/postgresql"
          _ "archetype/app/shared/infrastructure/observability"
          "github.com/Ignaciojeria/ioc"
      )
      ```
    sources:
      - cmd/api/main.go

  - md: configuration.md
    description: "Environment configuration with caarlos0/env and godotenv"
    sources:
      - app/shared/configuration/conf.go
      - app/shared/configuration/parse.go
    test_sources:
      - app/shared/configuration/conf_test.go
      - app/shared/configuration/parse_test.go

  - md: httpserver.md
    description: "HTTP server setup with Fuego framework and healthcheck"
    sources:
      - app/shared/infrastructure/httpserver/server.go
    test_sources:
      - app/shared/infrastructure/httpserver/server_test.go

  - md: request-logger-middleware.md
    description: "HTTP request logger middleware"
    sources:
      - app/shared/infrastructure/httpserver/middleware/request_logger.go
    test_sources:
      - app/shared/infrastructure/httpserver/middleware/request_logger_test.go

  - md: observability.md
    description: "OpenTelemetry observability setup"
    sources:
      - app/shared/infrastructure/observability/observability.go
    test_sources:
      - app/shared/infrastructure/observability/observability_test.go

  - md: postgresql-connection.md
    description: "PostgreSQL connection with embedded migrations via sqlx and golang-migrate"
    sources:
      - app/shared/infrastructure/postgresql/connection.go
    test_sources:
      - app/shared/infrastructure/postgresql/connection_test.go

  - md: postgresql-migrations.md
    description: "Example migrations - naming convention and up/down pattern (golang-migrate)"
    sources:
      - app/shared/infrastructure/postgresql/migrations/000001_initial_schema.up.sql
      - app/shared/infrastructure/postgresql/migrations/000001_initial_schema.down.sql

  - md: eventbus-strategy.md
    description: "EventBus strategy pattern - interfaces, middleware, and types"
    sources:
      - app/shared/infrastructure/eventbus/strategy.go
      - app/shared/infrastructure/eventbus/factory.go

  - md: eventbus-gcp.md
    description: "GCP Pub/Sub client, publisher, and subscriber implementation"
    sources:
      - app/shared/infrastructure/eventbus/gcp_client.go
      - app/shared/infrastructure/eventbus/gcp_publisher.go
      - app/shared/infrastructure/eventbus/gcp_subscriber.go
    test_sources:
      - app/shared/infrastructure/eventbus/gcp_client_test.go
      - app/shared/infrastructure/eventbus/gcp_publisher_test.go
      - app/shared/infrastructure/eventbus/gcp_subscriber_test.go

  - md: eventbus-nats.md
    description: "NATS client, publisher, and subscriber implementation"
    sources:
      - app/shared/infrastructure/eventbus/nats_client.go
      - app/shared/infrastructure/eventbus/nats_publisher.go
      - app/shared/infrastructure/eventbus/nats_subscriber.go
    test_sources:
      - app/shared/infrastructure/eventbus/nats_client_test.go

  - md: consumer.md
    description: "Inbound EventBus consumer pattern with CloudEvents"
    sources:
      - app/adapter/in/eventbus/consumer.go
    test_sources:
      - app/adapter/in/eventbus/consumer_test.go

  - md: publisher.md
    description: "Outbound EventBus publisher adapter"
    sources:
      - app/adapter/out/eventbus/publisher.go
    test_sources:
      - app/adapter/out/eventbus/publisher_test.go

  - md: fuegoapi-controllers.md
    description: "REST API controllers scaffolded with Fuego (GET, POST, PUT, PATCH, DELETE)"
    sources:
      - app/adapter/in/fuegoapi/get.go
      - app/adapter/in/fuegoapi/post.go
      - app/adapter/in/fuegoapi/put.go
      - app/adapter/in/fuegoapi/patch.go
      - app/adapter/in/fuegoapi/delete.go
    test_sources:
      - app/adapter/in/fuegoapi/get_test.go
      - app/adapter/in/fuegoapi/post_test.go
      - app/adapter/in/fuegoapi/put_test.go
      - app/adapter/in/fuegoapi/patch_test.go
      - app/adapter/in/fuegoapi/delete_test.go

  - md: domain.md
    description: "Domain entities only"
    sources:
      - app/domain/entity/template.go

  - md: ports.md
    description: "Hexagonal ports - in (executors) and out (repositories, publishers)"
    sources:
      - app/application/ports/in/get_template.go
      - app/application/ports/out/template_repository.go
      - app/application/ports/out/event_publisher.go

  - md: postgres-repository.md
    description: "PostgreSQL adapter - implements ports/out.TemplateRepository"
    sources:
      - app/adapter/out/postgres/template_repository.go
    test_sources:
      - app/adapter/out/postgres/template_repository_test.go

  - md: usecase.md
    description: "Use case implementation - imports ports/out, returns ports/in executor"
    sources:
      - app/application/usecase/get_template.go
